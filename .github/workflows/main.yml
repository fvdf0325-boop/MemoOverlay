name: Build MemoOverlay Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew packages
        run: |
          brew update
          brew install ldid dpkg

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: Install iOS SDK
        run: |
          mkdir -p /opt/theos/sdks
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -R /tmp/theos-sdks/*.sdk /opt/theos/sdks/
          rm -rf /tmp/theos-sdks

      - name: Check Environment
        run: |
          clang --version
          xcode-select -p
          ls /opt/theos/sdks

      - name: Build
        env:
          THEOS: /opt/theos
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: MemoOverlay-deb
          path: packages/*.deb
