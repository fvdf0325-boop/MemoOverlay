name: Build MemoOverlay Tweak

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Homebrew packages
        run: |
          brew update
          brew install ldid dpkg make

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $HOME/theos
          echo "THEOS=$HOME/theos" >> $GITHUB_ENV
          echo "$HOME/theos/bin" >> $GITHUB_PATH

      - name: Install iOS SDK
        run: |
          mkdir -p $HOME/theos/sdks
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/theos-sdks
          cp -R /tmp/theos-sdks/*.sdk $HOME/theos/sdks/
          rm -rf /tmp/theos-sdks

      - name: Verify Environment
        run: |
          echo "THEOS=$THEOS"
          clang --version
          xcode-select -p
          ls -la $HOME/theos
          ls -la $HOME/theos/sdks

      - name: Build
        env:
          THEOS: ${{ env.THEOS }}
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: MemoOverlay-deb
          path: packages/*.deb
          if-no-files-found: error
