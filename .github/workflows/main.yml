name: Build MemoOverlay

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      THEOS: /opt/theos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            make \
            perl \
            curl \
            unzip \
            zip \
            clang \
            lld \
            llvm \
            fakeroot \
            xz-utils

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git /opt/theos
          echo "/opt/theos/bin" >> $GITHUB_PATH

      - name: Install SDKs
        run: |
          git clone --depth=1 https://github.com/theos/sdks.git /tmp/sdks
          mkdir -p /opt/theos/sdks
          cp -R /tmp/sdks/*.sdk /opt/theos/sdks/
          rm -rf /tmp/sdks

      - name: Install ldid
        run: |
          curl -LO https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_linux_x86_64
          chmod +x ldid_linux_x86_64
          sudo mv ldid_linux_x86_64 /usr/local/bin/ldid

      - name: Use system clang
        run: |
          mkdir -p /opt/theos/toolchain/linux/iphone/bin
          ln -sf $(which clang) /opt/theos/toolchain/linux/iphone/bin/clang
          ln -sf $(which clang++) /opt/theos/toolchain/linux/iphone/bin/clang++
          chmod +x /opt/theos/toolchain/linux/iphone/bin/clang
          chmod +x /opt/theos/toolchain/linux/iphone/bin/clang++

      - name: Debug
        run: |
          echo "THEOS=$THEOS"
          ls -R /opt/theos/toolchain || true
          /opt/theos/toolchain/linux/iphone/bin/clang --version

      - name: Build
        run: |
          make clean
          make package FINALPACKAGE=1

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: MemoOverlay-deb
          path: packages/*.deb
          if-no-files-found: error
